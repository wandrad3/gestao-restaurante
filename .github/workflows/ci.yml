name: CI - Build, Test, Sonar and PR

on:
  push:
    branches:
      - "feature/**"
      - "bugfix/**"
      - "hotfix/**"
      - "chore/**"
      - "refactor/**"
  pull_request:
    branches:
      - develop
      - main
    types:
      - opened
      - synchronize
      - reopened
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  actions: read
  checks: read

env:
  JAVA_VERSION: "21"
  JAVA_DISTRIBUTION: temurin
  MAVEN_OPTS: -Xmx1024m
  SONAR_EXCLUSIONS: "**/dto/**,**/Application.java"
  SONAR_COVERAGE_EXCLUSIONS: "**/dto/**,**/Application.java,**/exception/**,**/SecurityConfig.java"

jobs:
  build-test:
    name: Build, tests and coverage
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Make Maven Wrapper executable
        run: chmod +x ./mvnw

      - name: Run build, tests and JaCoCo gate
        run: ./mvnw clean verify -B

      - name: Upload JaCoCo report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report-${{ github.run_id }}
          path: target/site/jacoco/
          if-no-files-found: warn
          retention-days: 14

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports-${{ github.run_id }}
          path: target/surefire-reports/
          if-no-files-found: warn
          retention-days: 7

  sonar:
    name: SonarCloud analysis
    runs-on: ubuntu-latest
    needs: build-test
    timeout-minutes: 15
    if: >
      github.event_name == 'push' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' &&
       github.event.pull_request.head.repo.full_name == github.repository)

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Cache SonarCloud packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Make Maven Wrapper executable
        run: chmod +x ./mvnw

      - name: Generate classes and coverage report
        run: ./mvnw clean verify -B

      - name: Run SonarCloud scan when configured
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_PROJECT_KEY: ${{ vars.SONAR_PROJECT_KEY }}
          SONAR_ORGANIZATION: ${{ vars.SONAR_ORGANIZATION }}
        shell: bash
        run: |
          if [[ -z "${SONAR_TOKEN}" || -z "${SONAR_PROJECT_KEY}" || -z "${SONAR_ORGANIZATION}" ]]; then
            echo "::warning title=SonarCloud not configured::Configure SONAR_TOKEN, SONAR_PROJECT_KEY and SONAR_ORGANIZATION to enable analysis."
            exit 0
          fi

          ./mvnw org.sonarsource.scanner.maven:sonar-maven-plugin:sonar \
            -Dsonar.projectKey="${SONAR_PROJECT_KEY}" \
            -Dsonar.organization="${SONAR_ORGANIZATION}" \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.java.coveragePlugin=jacoco \
            -Dsonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml \
            -Dsonar.exclusions="${SONAR_EXCLUSIONS}" \
            -Dsonar.coverage.exclusions="${SONAR_COVERAGE_EXCLUSIONS}" \
            -Dsonar.qualitygate.wait=true \
            -B

  create-pr:
    name: Create PR to develop
    runs-on: ubuntu-latest
    needs:
      - build-test
      - sonar
    timeout-minutes: 5
    if: >
      always() &&
      github.event_name == 'push' &&
      needs.build-test.result == 'success' &&
      (needs.sonar.result == 'success' || needs.sonar.result == 'skipped') &&
      (startsWith(github.ref, 'refs/heads/feature/') ||
       startsWith(github.ref, 'refs/heads/bugfix/') ||
       startsWith(github.ref, 'refs/heads/hotfix/') ||
       startsWith(github.ref, 'refs/heads/chore/') ||
       startsWith(github.ref, 'refs/heads/refactor/'))
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Create develop branch when absent
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          if gh api "repos/${GITHUB_REPOSITORY}/branches/develop" >/dev/null 2>&1; then
            echo "Branch develop already exists."
            exit 0
          fi

          main_sha="$(gh api "repos/${GITHUB_REPOSITORY}/git/ref/heads/main" --jq '.object.sha')"
          gh api "repos/${GITHUB_REPOSITORY}/git/refs" \
            --method POST \
            --field ref="refs/heads/develop" \
            --field sha="${main_sha}"
          echo "Branch develop created from main."

      - name: Create or update pull request
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          branch_name="${GITHUB_REF#refs/heads/}"
          existing_pr="$(gh pr list \
            --head "${branch_name}" \
            --base develop \
            --state open \
            --json number \
            --jq '.[0].number // empty')"

          if [[ -n "${existing_pr}" ]]; then
            echo "PR #${existing_pr} already exists for ${branch_name} -> develop."
            exit 0
          fi

          clean_title="$(printf '%s' "${branch_name#*/}" | tr '_-' '  ')"
          pr_body="$(cat <<EOF
          ## Pull request criada automaticamente

          **Origem:** \`${branch_name}\`
          **Destino:** \`develop\`

          ### Pipeline validada

          - [x] Compilação com Java ${JAVA_VERSION}
          - [x] Testes unitários e de integração
          - [x] Gate JaCoCo de cobertura por instruções >= 80%
          - [x] Análise SonarCloud, quando configurada

          > PR criada pelo workflow \`${GITHUB_WORKFLOW}\` após a conclusão da pipeline.
          EOF
          )"

          pr_url="$(gh pr create \
            --base develop \
            --head "${branch_name}" \
            --title "${clean_title}" \
            --body "${pr_body}")"

          echo "PR created: ${pr_url}"
